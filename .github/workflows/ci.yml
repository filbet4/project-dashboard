name: Project Dashboard CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: project_dashboard

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/project_dashboard
      SECRET_KEY: test_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI
        run: |
          nohup python main.py > server.log 2>&1 &
          sleep 10

      - name: Run Phase 3 Tests
        run: python test_phase3.py

      - name: Run Phase 4 Tests
        run: python test_phase4.py

      - name: Run Phase 5 Tests
        run: python test_phase5.py

      - name: Build Docker image
        run: docker build -t project-dashboard .